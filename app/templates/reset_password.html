{% extends 'base.html' %}

{% block title %}Reset Password - LoveEdit Studio{% endblock %}
{% block robots %}<meta name="robots" content="noindex, nofollow">{% endblock %}

{% block content %}
<section class="auth-section">
<div class="auth-wrapper">
    <div class="auth-panel glass-panel">
        <div class="auth-header">
            <h2>Reset Password</h2>
            <p>Set a secure new password for your account.</p>
        </div>
        
        <form action="{{ url_for('reset_password', token=token) }}" method="POST" class="auth-form" id="reset-password-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password" class="form-label">New Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Min. 6 characters" minlength="6" required>
                <div class="pwd-strength-container" style="margin-top: 0.5rem; display: none;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">
                        <span>Password Strength:</span>
                        <strong id="pwd-strength-label">Weak</strong>
                    </div>
                    <div style="height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden;">
                        <div id="pwd-strength-bar" style="width: 0%; height: 100%; transition: all 0.3s; background: #ff5a5a;"></div>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Verify new password" required>
                <span class="validation-message" id="confirm-pwd-error" style="color: #ff5a5a; font-size: 0.75rem; margin-top: 0.25rem; display: none;">Passwords do not match.</span>
            </div>
            
            <button type="submit" class="btn-premium" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Apply Password <i class="fas fa-key"></i>
            </button>
        </form>
    </div>
</div>
</section>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm_password');
        const confirmError = document.getElementById('confirm-pwd-error');
        const strengthContainer = document.querySelector('.pwd-strength-container');
        const strengthLabel = document.getElementById('pwd-strength-label');
        const strengthBar = document.getElementById('pwd-strength-bar');
        const form = document.getElementById('reset-password-form');

        // Dynamic password strength indicator
        passwordInput.addEventListener('input', () => {
            const pwd = passwordInput.value;
            if (pwd.length === 0) {
                strengthContainer.style.display = 'none';
                return;
            }
            strengthContainer.style.display = 'block';

            let score = 0;
            if (pwd.length >= 6) score++;
            if (pwd.length >= 10) score++;
            if (/[A-Z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;

            let label = "Weak";
            let color = "#ff5a5a";
            let width = "25%";

            if (score >= 4) {
                label = "Strong";
                color = "#5aff5a";
                width = "100%";
            } else if (score >= 2) {
                label = "Medium";
                color = "#ffc107";
                width = "60%";
            }

            strengthLabel.textContent = label;
            strengthLabel.style.color = color;
            strengthBar.style.backgroundColor = color;
            strengthBar.style.width = width;
        });

        // Match validation
        const validateMatch = () => {
            if (confirmInput.value.length > 0 && passwordInput.value !== confirmInput.value) {
                confirmError.style.display = 'block';
                return false;
            } else {
                confirmError.style.display = 'none';
                return true;
            }
        };

        passwordInput.addEventListener('input', validateMatch);
        confirmInput.addEventListener('input', validateMatch);

        form.addEventListener('submit', (e) => {
            if (!validateMatch()) {
                e.preventDefault();
            }
        });
    });
</script>
{% endblock %}
