{% extends 'base.html' %}

{% block title %}Forgot Password - LoveEdit Studio{% endblock %}
{% block robots %}<meta name="robots" content="noindex, nofollow">{% endblock %}

{% block content %}
<section class="auth-section">
<div class="auth-wrapper">
    <div class="auth-panel glass-panel">
        <div class="auth-header">
            <h2>Recover Password</h2>
            <p>Enter your registered email address and we'll dispatch a secure recovery link.</p>
        </div>
        
        <form action="{{ url_for('forgot_password') }}" method="POST" class="auth-form" id="forgot-password-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="name@domain.com" required>
            </div>
            
            <button type="submit" class="btn-premium" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Send Reset Link <i class="fas fa-paper-plane"></i>
            </button>
        </form>
        
        <div class="auth-footer">
            Remember your credentials? <a href="{{ url_for('login') }}">Sign In</a>
        </div>
    </div>
</div>
</section>
{% endblock %}
