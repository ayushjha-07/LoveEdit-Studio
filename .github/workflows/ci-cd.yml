name: LoveEdit Studio CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout codebase
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-level: '3.13'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libjpeg-dev zlib1g-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compile check Python code
      run: |
        python -m py_compile run.py app/__init__.py app/config.py
        python -m py_compile app/models/*.py app/routes/*.py app/services/*.py app/utils/*.py

    - name: Run E2E Test Suite Assertions
      run: |
        # Seed initial database
        python -c "from app import create_app; create_app('testing')"
        # Execute the verification scripts in scratch
        python scratch/verify_analytics.py
        python scratch/verify_security.py
        python scratch/verify_auth_flows.py
        python scratch/verify_dashboard_features.py

  build-image:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout codebase
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build production Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: loveedit-studio:latest
